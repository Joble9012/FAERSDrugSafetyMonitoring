tables:
  demographics:
    owner: data_team
    columns:
      - name: primary_id
        type: string
        nullable: false
      - name: case_id
        type: string
        nullable: false
      - name: year
        type: int
        nullable: false
      - name: age_group
        type: string
        nullable: true
        allowed_values: ["A", "C", "E", "I", "N", "T"]
      - name: gender_of_patient
        type: string
        nullable: true

  drug:
    owner: data_team
    columns:
      - name: primary_id
        type: string
        nullable: true
      - name: case_id
        type: string
        nullable: false
      - name: year
        type: int
        nullable: false
      - name: drug_name
        type: string
        nullable: true

  reaction:
    owner: data_team
    columns:
      - name: primary_id
        type: string
        nullable: true
      - name: case_id
        type: string
        nullable: false
      - name: year
        type: int
        nullable: false
      - name: preferred_term_for_event
        type: string
        nullable: true

  outcome:
    owner: data_team
    columns:
      - name: primary_id
        type: string
        nullable: true
      - name: case_id
        type: string
        nullable: false
      - name: year
        type: int
        nullable: false
      - name: patient_outcome
        type: string
        nullable: true
        allowed_values: ["DE", "HO", "LT", "DS", "CA", "RI", "OT"]